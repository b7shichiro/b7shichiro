<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Journal Explosion</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Figtree',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff6b6b,#feca57,#48dbfb,#5f27cd);
    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.background-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:1;
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    height:100vh;
}

#buttons{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    width:260px;
}

button{
    border:none;
    cursor:pointer;
    padding:16px;
    border-radius:18px;
    color:white;
    font-weight:700;
    background:rgba(255,255,255,.2);
}

#journal{
    display:none;
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    background:transparent;
    border:none;
    outline:none;
    resize:none;
    color:white;
    font-size:1.8rem;
    padding:60px;
    caret-color:white;
}

.particle{
    position:fixed;
    pointer-events:none;
    font-size:1.7rem;
    font-weight:900;
    color:white;
    text-shadow:0 0 12px rgba(255,255,255,0.9);
    opacity:1;
    animation:boom 2.5s ease-out forwards;
}

@keyframes boom{
    0%{
        transform:translate(0,0) scale(1);
        opacity:1;
    }
    100%{
        transform:translate(var(--x), var(--y)) scale(0.7) rotate(var(--r));
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="background-overlay"></div>

<div class="container">

    <div id="buttons">
        <button onclick="start()">😊 Happy</button>
        <button onclick="start()">😔 Sad</button>
        <button onclick="start()">😡 Angry</button>
        <button onclick="start()">😌 Calm</button>
        <button onclick="start()">🤩 Excited</button>
    </div>

    <textarea id="journal"></textarea>

</div>

<script>
const buttons = document.getElementById("buttons");
const journal = document.getElementById("journal");

function start(){
    buttons.style.display = "none";
    journal.style.display = "block";
    journal.focus();
}

/* EXACT TEXT POSITION EXPLOSION */
journal.addEventListener("keydown",(e)=>{

    if(e.key !== "Enter") return;

    e.preventDefault();

    const text = journal.value.trim();
    if(!text) return;

    const rect = journal.getBoundingClientRect();

    const style = getComputedStyle(journal);
    const fontSize = parseFloat(style.fontSize);
    const lineHeight = parseFloat(style.lineHeight) || fontSize * 1.4;
    const paddingLeft = parseFloat(style.paddingLeft);
    const paddingTop = parseFloat(style.paddingTop);

    const words = text.split(" ");

    words.forEach((word)=>{

        const el = document.createElement("div");
        el.className = "particle";
        el.textContent = word;

        /* start EXACT at text area origin + padding */
        const startX = rect.left + paddingLeft;
        const startY = rect.top + paddingTop;

        el.style.left = startX + "px";
        el.style.top = startY + "px";

        /* TRUE explosion randomness */
        const angle = Math.random() * Math.PI * 2;
        const distance = 300 + Math.random() * 500;

        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        el.style.setProperty("--x", x + "px");
        el.style.setProperty("--y", y + "px");
        el.style.setProperty("--r", (Math.random()*720 - 360) + "deg");

        document.body.appendChild(el);

        setTimeout(()=>el.remove(),2500);
    });

    journal.value = "";
});
</script>

</body>
</html>
