<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Journal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Figtree',sans-serif;
}

body{
    --c1:#ff6b6b;
    --c2:#feca57;
    --c3:#48dbfb;
    --c4:#5f27cd;

    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(-45deg,var(--c1),var(--c2),var(--c3),var(--c4));
    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.blur{
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.35;
    z-index:0;
}

.blur1{background:white; top:-150px; left:-150px;}
.blur2{background:#00e5ff; bottom:-150px; right:-150px;}

.background-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(25px);
    z-index:1;
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    height:100vh;
}

#buttons{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    width:260px;
}

button{
    border:none;
    cursor:pointer;
    padding:16px;
    border-radius:18px;
    color:white;
    font-weight:600;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(20px);
}

#journal{
    display:none;
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    background:transparent;
    border:none;
    outline:none;
    resize:none;
    color:white;
    font-size:1.6rem;
    padding:60px;
    caret-color:white;
}

/* REAL explosion particles */
.particle{
    position:fixed;
    color:white;
    font-size:1.2rem;
    pointer-events:none;
    white-space:nowrap;

    animation:explode 1.2s ease-out forwards;
}

@keyframes explode{
    0%{
        transform:translate(var(--x0), var(--y0)) scale(1);
        opacity:1;
        filter:blur(0px);
    }
    100%{
        transform:translate(var(--x1), var(--y1)) scale(0.6);
        opacity:0;
        filter:blur(8px);
    }
}
</style>
</head>

<body>

<div class="blur blur1"></div>
<div class="blur blur2"></div>
<div class="background-overlay"></div>

<div class="container">

    <div id="buttons">
        <button onclick="setMood('happy')">😊 Happy</button>
        <button onclick="setMood('sad')">😔 Sad</button>
        <button onclick="setMood('angry')">😡 Angry</button>
        <button onclick="setMood('calm')">😌 Calm</button>
        <button onclick="setMood('excited')">🤩 Excited</button>
    </div>

    <textarea id="journal"></textarea>

</div>

<script>
const root = document.body;
const buttons = document.getElementById("buttons");
const journal = document.getElementById("journal");

function setMood(mood){

    buttons.style.display = "none";
    journal.style.display = "block";
    journal.focus();

    const themes = {
        happy:["#FFD93D","#FF6B6B","#FF9FF3","#F368E0"],
        sad:["#0F2027","#203A43","#2C5364","#4CA1AF"],
        angry:["#8B0000","#B22222","#FF0000","#FF416C"],
        calm:["#43CEA2","#185A9D","#6DD5ED","#2193B0"],
        excited:["#FF9966","#FF5E62","#FF9A9E","#FAD0C4"]
    };

    const c = themes[mood];
    root.style.setProperty("--c1",c[0]);
    root.style.setProperty("--c2",c[1]);
    root.style.setProperty("--c3",c[2]);
    root.style.setProperty("--c4",c[3]);
}

/* FIXED: correct cursor explosion position */
journal.addEventListener("keydown", (e)=>{

    if(e.key !== "Enter") return;

    e.preventDefault();

    const text = journal.value.trim();
    if(!text) return;

    const rect = journal.getBoundingClientRect();

    // EXACT cursor position approximation
    const lines = journal.value.substr(0, journal.selectionStart).split("\n");
    const lastLine = lines[lines.length - 1];

    const charWidth = 14;
    const lineHeight = 28;

    const x = rect.left + 60 + (lastLine.length * charWidth);
    const y = rect.top + 60 + ((lines.length - 1) * lineHeight);

    const words = text.split(" ");

    words.forEach((w)=>{

        const el = document.createElement("div");
        el.className = "particle";
        el.textContent = w;

        const dx = (Math.random() * 800 - 400);
        const dy = (Math.random() * 800 - 400);

        el.style.left = x + "px";
        el.style.top = y + "px";

        el.style.setProperty("--x0","0px");
        el.style.setProperty("--y0","0px");
        el.style.setProperty("--x1",dx + "px");
        el.style.setProperty("--y1",dy + "px");

        document.body.appendChild(el);

        setTimeout(()=>el.remove(),1200);
    });

    journal.value = "";
});
</script>

</body>
</html>
