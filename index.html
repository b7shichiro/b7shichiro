<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mood Journal AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Figtree',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff6b6b,#feca57,#48dbfb,#5f27cd);
    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.background-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:1;
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    height:100vh;
}

#buttons{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    width:260px;
}

button{
    border:none;
    cursor:pointer;
    padding:16px;
    border-radius:18px;
    color:white;
    font-weight:700;
    background:rgba(255,255,255,.2);
}

#journal{
    display:none;
    position:absolute;
    top:60%;
    left:50%;
    transform:translate(-50%,-50%);
    width:75%;
    max-width:900px;
    height:200px;

    background:transparent;
    border:none;
    outline:none;
    resize:none;

    text-align:center;
    color:white;
    font-size:2rem;
    caret-color:white;
}

/* AI */
#aiBox{
    position:absolute;
    top:72%;
    left:50%;
    transform:translateX(-50%);
    width:70%;
    max-width:800px;

    color:rgba(255,255,255,0.85);
    font-size:1rem;
    text-align:center;
    font-style:italic;
}

/* particles */
.particle{
    position:fixed;
    pointer-events:none;
    font-size:2rem;
    font-weight:900;
    color:white;
    text-shadow:0 0 18px rgba(255,255,255,1);
    animation:boom 5s ease-out forwards;
}

@keyframes boom{
    0%{transform:translate(0,0) scale(1); opacity:1;}
    100%{transform:translate(var(--x), var(--y)) scale(0.6) rotate(var(--r)); opacity:0;}
}

/* TIME - made LESS dark */
#datetime{
    position:fixed;
    top:10px;
    left:10px;
    font-size:11px;
    font-style:italic;
    color:rgba(255,255,255,0.75);
    z-index:3;
}

/* CREDIT - made LESS dark */
#credit{
    position:fixed;
    bottom:10px;
    right:10px;
    font-size:11px;
    font-style:italic;
    color:rgba(255,255,255,0.70);
    z-index:3;
}
</style>
</head>

<body>

<div class="background-overlay"></div>

<div class="container">

    <div id="buttons">
        <button onclick="start()">😊 Happy</button>
        <button onclick="start()">😔 Sad</button>
        <button onclick="start()">😡 Angry</button>
        <button onclick="start()">😌 Calm</button>
        <button onclick="start()">🤩 Excited</button>
    </div>

    <textarea id="journal"></textarea>
    <div id="aiBox"></div>

</div>

<div id="datetime"></div>
<div id="credit">made by bshichi</div>

<script>
const buttons = document.getElementById("buttons");
const journal = document.getElementById("journal");
const aiBox = document.getElementById("aiBox");

function start(){
    buttons.style.display = "none";
    journal.style.display = "block";
    journal.focus();
}

function pick(arr){
    return arr[Math.floor(Math.random() * arr.length)];
}

function getAIResponse(text){
    text = text.toLowerCase();

    if(text.includes("i'm sorry") || text.includes("im sorry")){
        return pick([
            "i hear you… it's okay.",
            "you don’t have to carry that alone.",
            "it’s alright. i’m still here.",
            "i understand. take your time.",
            "you’re not a burden for saying that."
        ]);
    }

    if(text.includes("thank you")){
        return pick([
            "i hear you.",
            "you don’t need to thank me… i’m here.",
            "i’m just glad you said it.",
            "that means more than you think.",
            "i’m listening."
        ]);
    }

    if(text.includes("i miss you")){
        return pick([
            "i hear that… it stays heavy.",
            "missing someone like that is hard.",
            "i’m here with you in that feeling.",
            "that kind of feeling lingers."
        ]);
    }

    if(text.includes("i love you")){
        return pick([
            "i hear you.",
            "that means something real.",
            "i’m listening…",
            "that’s something important."
        ]);
    }

    if(text.includes("im sad") || text.includes("i'm sad")){
        return pick([
            "i hear you… that sounds heavy.",
            "you don’t need to hide it here.",
            "it’s okay to feel that.",
            "i’m here with you."
        ]);
    }

    if(text.includes("angry")){
        return pick([
            "i hear the frustration.",
            "that’s a lot to hold.",
            "you’re allowed to feel that.",
            "breathe… i hear you."
        ]);
    }

    return pick([
        "i hear you.",
        "i’m listening.",
        "tell me more.",
        "i understand.",
        "i’m here."
    ]);
}

journal.addEventListener("keydown",(e)=>{

    if(e.key !== "Enter") return;

    e.preventDefault();

    const text = journal.value.trim();
    if(!text) return;

    aiBox.innerText = getAIResponse(text);

    const words = text.split(" ");
    const rect = journal.getBoundingClientRect();

    const startX = rect.left + rect.width / 2;
    const startY = rect.top + rect.height / 2 - 120;

    words.forEach((word)=>{

        const el = document.createElement("div");
        el.className = "particle";
        el.textContent = word;

        el.style.left = startX + "px";
        el.style.top = startY + "px";

        const angle = Math.random() * Math.PI * 2;
        const distance = 900 + Math.random() * 700;

        el.style.setProperty("--x", Math.cos(angle) * distance + "px");
        el.style.setProperty("--y", Math.sin(angle) * distance + "px");
        el.style.setProperty("--r", (Math.random()*720 - 360) + "deg");

        document.body.appendChild(el);
        setTimeout(()=>el.remove(),5000);
    });

    journal.value = "";
});

/* CLOCK */
function updateTime(){
    const now = new Date();
    document.getElementById("datetime").innerText =
        now.toLocaleDateString() + " • " +
        now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
